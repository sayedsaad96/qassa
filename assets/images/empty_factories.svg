<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="prf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
  </defs>

  <!-- Magnifier -->
  <circle cx="100" cy="78" r="48" fill="#F4F6FB"/>
  <circle cx="100" cy="78" r="40" fill="white" stroke="#E4E9F2" stroke-width="2.5"/>
  <!-- Inner content being searched -->
  <circle cx="100" cy="78" r="30" fill="#EEF2FF" fill-opacity="0.5"/>

  <!-- Tiny factory inside lens (blurred / not found) -->
  <rect x="84" y="76" width="32" height="22" rx="5" fill="#9BACC8" fill-opacity="0.3"/>
  <rect x="87" y="66" width="5" height="12" rx="2.5" fill="#9BACC8" fill-opacity="0.3"/>
  <rect x="97" y="62" width="5" height="16" rx="2.5" fill="#9BACC8" fill-opacity="0.3"/>
  <rect x="107" y="68" width="5" height="10" rx="2.5" fill="#9BACC8" fill-opacity="0.3"/>

  <!-- X mark over factory -->
  <circle cx="100" cy="78" r="14" fill="#FEEAE9" fill-opacity="0.9"/>
  <line x1="93" y1="71" x2="107" y2="85" stroke="#E0230E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="107" y1="71" x2="93" y2="85" stroke="#E0230E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Magnifier handle -->
  <line x1="133" y1="111" x2="152" y2="130" stroke="#9BACC8" stroke-width="8" stroke-linecap="round"/>
  <circle cx="100" cy="78" r="40" fill="none" stroke="#9BACC8" stroke-width="4"/>

  <!-- Filter chips floating (crossed) -->
  <rect x="24" y="28" width="40" height="14" rx="7" fill="#F4F6FB" stroke="#E4E9F2" stroke-width="1"/>
  <line x1="56" y1="31" x2="62" y2="37" stroke="#E0230E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="31" x2="56" y2="37" stroke="#E0230E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <rect x="136" y="28" width="40" height="14" rx="7" fill="#F4F6FB" stroke="#E4E9F2" stroke-width="1"/>
  <line x1="168" y1="31" x2="174" y2="37" stroke="#E0230E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="174" y1="31" x2="168" y2="37" stroke="#E0230E" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Clear filter CTA hint -->
  <rect x="60" y="150" width="80" height="22" rx="11" fill="url(#prf)" fill-opacity="0.1"/>
  <rect x="72" y="157" width="56" height="8" rx="4" fill="#1A3FC4" fill-opacity="0.4"/>
</svg>
