<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="prs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
  </defs>

  <!-- Send / outbox arrow illustration -->
  <circle cx="100" cy="80" r="56" fill="#EEF2FF"/>

  <!-- Envelope body -->
  <rect x="60" y="58" width="80" height="54" rx="8" fill="white" stroke="#E4E9F2" stroke-width="1.5"/>
  <!-- Envelope top flap (open) -->
  <path d="M60 66 L100 90 L140 66" fill="none" stroke="#1A3FC4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M60 58 L100 80 L140 58" fill="#EEF2FF" stroke="#E4E9F2" stroke-width="1.2"/>

  <!-- Content lines in envelope -->
  <rect x="72" y="94" width="56" height="5" rx="2.5" fill="#E4E9F2"/>
  <rect x="72" y="103" width="40" height="5" rx="2.5" fill="#E4E9F2"/>

  <!-- Upward arrow (sending) -->
  <circle cx="100" cy="42" r="14" fill="url(#prs)" fill-opacity="0.15"/>
  <line x1="100" y1="52" x2="100" y2="32" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M93 38 L100 32 L107 38" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Speed/motion lines -->
  <line x1="74" y1="38" x2="66" y2="34" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="76" y1="43" x2="66" y2="43" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="126" y1="38" x2="134" y2="34" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="124" y1="43" x2="134" y2="43" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Factory icon small -->
  <rect x="26" y="90" width="26" height="18" rx="4" fill="#1A3FC4" fill-opacity="0.12"/>
  <rect x="29" y="82" width="4" height="10" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>
  <rect x="36" y="78" width="4" height="14" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>
  <rect x="43" y="84" width="4" height="8" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>

  <rect x="148" y="90" width="26" height="18" rx="4" fill="#1A3FC4" fill-opacity="0.12"/>
  <rect x="151" y="82" width="4" height="10" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>
  <rect x="158" y="78" width="4" height="14" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>
  <rect x="165" y="84" width="4" height="8" rx="2" fill="#1A3FC4" fill-opacity="0.1"/>

  <!-- Dashed ring -->
  <circle cx="100" cy="80" r="68" fill="none" stroke="#1A3FC4" stroke-width="1" stroke-dasharray="4 5" stroke-opacity="0.12"/>

  <!-- Browse requests CTA hint -->
  <rect x="52" y="148" width="96" height="22" rx="11" fill="url(#prs)" fill-opacity="0.1"/>
  <rect x="64" y="155" width="72" height="8" rx="4" fill="#1A3FC4" fill-opacity="0.45"/>
</svg>
