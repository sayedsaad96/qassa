<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="320" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E6F9F3"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="pr3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
    <linearGradient id="ac3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#FF9040"/>
    </linearGradient>
    <linearGradient id="gr3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A86B"/>
      <stop offset="100%" stop-color="#00D688"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="320" height="240" fill="url(#bg3)"/>

  <!-- Background orbs -->
  <circle cx="30" cy="50" r="35" fill="#1A3FC4" fill-opacity="0.05"/>
  <circle cx="295" cy="200" r="45" fill="#FF5C00" fill-opacity="0.06"/>

  <!-- Title bar area -->
  <rect x="60" y="15" width="200" height="22" rx="8" fill="white" fill-opacity="0.7"/>
  <rect x="70" y="21" width="80" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.5"/>
  <rect x="230" y="20" width="22" height="8" rx="4" fill="#FF5C00" fill-opacity="0.4"/>

  <!-- Best price offer card (highlighted) -->
  <rect x="45" y="44" width="230" height="55" rx="12" fill="white" filter="url(#sh3)"/>
  <rect x="45" y="44" width="4" height="55" rx="2" fill="url(#ac3)"/>
  <!-- Badge -->
  <rect x="55" y="50" width="70" height="14" rx="7" fill="url(#ac3)"/>
  <rect x="60" y="54" width="60" height="6" rx="3" fill="white" fill-opacity="0.9"/>
  <!-- Factory name -->
  <rect x="55" y="70" width="55" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.7"/>
  <!-- Stars -->
  <text x="55" y="87" font-size="9" fill="#F59E0B">★★★★★</text>
  <!-- Price big -->
  <rect x="185" y="52" width="50" height="18" rx="5" fill="#EEF2FF"/>
  <rect x="190" y="57" width="40" height="8" rx="3" fill="#1A3FC4"/>
  <!-- Total -->
  <rect x="185" y="74" width="74" height="14" rx="5" fill="#F4F6FB"/>
  <rect x="190" y="78" width="64" height="6" rx="3" fill="#9BACC8"/>
  <!-- Lead time -->
  <rect x="130" y="78" width="50" height="12" rx="4" fill="#E4E9F2" fill-opacity="0.7"/>
  <rect x="134" y="82" width="42" height="4" rx="2" fill="#9BACC8"/>

  <!-- Fastest offer card -->
  <rect x="45" y="106" width="230" height="50" rx="12" fill="white" filter="url(#sh3)"/>
  <rect x="45" y="106" width="4" height="50" rx="2" fill="url(#pr3)"/>
  <!-- Badge -->
  <rect x="55" y="112" width="68" height="14" rx="7" fill="url(#pr3)"/>
  <rect x="60" y="116" width="58" height="6" rx="3" fill="white" fill-opacity="0.9"/>
  <!-- Factory name -->
  <rect x="55" y="131" width="50" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.7"/>
  <!-- Stars -->
  <text x="55" y="148" font-size="9" fill="#F59E0B">★★★★</text>
  <text x="91" y="148" font-size="9" fill="#E4E9F2">★</text>
  <!-- Price -->
  <rect x="188" y="114" width="47" height="16" rx="5" fill="#EEF2FF"/>
  <rect x="193" y="119" width="37" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.6"/>
  <!-- Fast badge -->
  <rect x="188" y="134" width="72" height="12" rx="4" fill="#EEF2FF"/>
  <rect x="192" y="138" width="64" height="4" rx="2" fill="#1A3FC4" fill-opacity="0.5"/>

  <!-- Third offer card (dimmed) -->
  <rect x="45" y="163" width="230" height="44" rx="12" fill="white" fill-opacity="0.6" filter="url(#sh3)"/>
  <rect x="45" y="163" width="4" height="44" rx="2" fill="#9BACC8"/>
  <rect x="55" y="170" width="45" height="5" rx="2.5" fill="#9BACC8" fill-opacity="0.6"/>
  <rect x="55" y="180" width="35" height="4" rx="2" fill="#E4E9F2"/>
  <rect x="200" y="173" width="40" height="14" rx="5" fill="#F4F6FB"/>
  <rect x="205" y="178" width="30" height="4" rx="2" fill="#9BACC8"/>

  <!-- Accept button -->
  <rect x="45" y="213" width="230" height="22" rx="11" fill="url(#gr3)"/>
  <rect x="105" y="219" width="110" height="10" rx="5" fill="white" fill-opacity="0.9"/>
  <!-- Checkmark icon -->
  <circle cx="84" cy="224" r="7" fill="white" fill-opacity="0.25"/>
  <path d="M81 224 L83 226 L87 222" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Handshake floating top right -->
  <text x="264" y="60" font-size="36" fill="#00A86B" fill-opacity="0.18">🤝</text>
</svg>
