<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="warn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E88C00"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="pr2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
  </defs>

  <!-- Clock circle background -->
  <circle cx="100" cy="80" r="56" fill="#FFF8E6"/>
  <circle cx="100" cy="80" r="48" fill="white" stroke="#FEF3C7" stroke-width="2"/>

  <!-- Clock face -->
  <circle cx="100" cy="80" r="38" fill="none" stroke="#FEF3C7" stroke-width="2.5"/>

  <!-- Clock tick marks -->
  <line x1="100" y1="44" x2="100" y2="48" stroke="#E88C00" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="112" x2="100" y2="116" stroke="#E88C00" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="80" x2="68" y2="80" stroke="#E88C00" stroke-width="2" stroke-linecap="round"/>
  <line x1="132" y1="80" x2="136" y2="80" stroke="#E88C00" stroke-width="2" stroke-linecap="round"/>

  <!-- Clock hands -->
  <line x1="100" y1="80" x2="100" y2="58" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="80" x2="116" y2="88" stroke="#E88C00" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="80" r="3" fill="#1A3FC4"/>

  <!-- Waiting dots animated (static here) -->
  <circle cx="80" cy="148" r="6" fill="#E88C00" fill-opacity="0.9"/>
  <circle cx="100" cy="148" r="6" fill="#E88C00" fill-opacity="0.55"/>
  <circle cx="120" cy="148" r="6" fill="#E88C00" fill-opacity="0.25"/>

  <!-- Envelope / offer icon floating -->
  <rect x="140" y="28" width="36" height="26" rx="6" fill="url(#pr2)" fill-opacity="0.15"/>
  <rect x="143" y="31" width="30" height="20" rx="4" fill="white" stroke="#E4E9F2" stroke-width="1"/>
  <path d="M143 35 L158 44 L173 35" fill="none" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Second envelope small -->
  <rect x="24" y="40" width="28" height="20" rx="5" fill="url(#pr2)" fill-opacity="0.1"/>
  <rect x="27" y="43" width="22" height="14" rx="3" fill="white" stroke="#E4E9F2" stroke-width="1"/>
  <path d="M27 47 L38 53 L49 47" fill="none" stroke="#1A3FC4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Dashed arc (sending animation) -->
  <circle cx="100" cy="80" r="66" fill="none" stroke="#E88C00" stroke-width="1.5" stroke-dasharray="5 6" stroke-opacity="0.2"/>
</svg>
