<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="320" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF0E8"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="prim2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5C00"/>
      <stop offset="100%" stop-color="#FF9040"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A3FC4" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="320" height="240" fill="url(#bg2)"/>

  <!-- Background circles -->
  <circle cx="280" cy="40" r="40" fill="#FF5C00" fill-opacity="0.06"/>
  <circle cx="40" cy="200" r="50" fill="#1A3FC4" fill-opacity="0.05"/>

  <!-- Clipboard / Request form card -->
  <rect x="80" y="20" width="130" height="190" rx="16" fill="white" filter="url(#sh2)"/>
  <!-- Clipboard top clip -->
  <rect x="120" y="14" width="50" height="14" rx="7" fill="#E4E9F2"/>
  <rect x="130" y="17" width="30" height="8" rx="4" fill="#9BACC8"/>

  <!-- Form content -->
  <rect x="93" y="38" width="104" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.15"/>
  <rect x="93" y="38" width="70" height="6" rx="3" fill="#1A3FC4"/>

  <!-- Product type chips -->
  <rect x="93" y="54" width="28" height="14" rx="7" fill="#EEF2FF"/>
  <rect x="95" y="58" width="24" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.6"/>
  <rect x="125" y="54" width="28" height="14" rx="7" fill="#EEF2FF" fill-opacity="0.4"/>
  <rect x="157" y="54" width="28" height="14" rx="7" fill="#EEF2FF" fill-opacity="0.4"/>

  <!-- Checkmark on selected chip -->
  <circle cx="110" cy="61" r="7" fill="#EEF2FF"/>
  <circle cx="110" cy="61" r="7" fill="#1A3FC4"/>
  <path d="M107 61 L109 63 L113 59" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Quantity label -->
  <rect x="93" y="78" width="30" height="5" rx="2.5" fill="#9BACC8"/>
  <!-- Quantity slider -->
  <rect x="93" y="90" width="104" height="4" rx="2" fill="#E4E9F2"/>
  <rect x="93" y="90" width="66" height="4" rx="2" fill="#1A3FC4"/>
  <circle cx="159" cy="92" r="7" fill="white" stroke="#1A3FC4" stroke-width="2"/>
  <!-- Quantity value box -->
  <rect x="93" y="100" width="30" height="18" rx="6" fill="#EEF2FF"/>
  <rect x="97" y="106" width="22" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.7"/>

  <!-- Material chips -->
  <rect x="93" y="128" width="25" height="12" rx="6" fill="#1A3FC4"/>
  <rect x="97" y="132" width="17" height="4" rx="2" fill="white" fill-opacity="0.9"/>
  <rect x="122" y="128" width="25" height="12" rx="6" fill="#E4E9F2"/>
  <rect x="151" y="128" width="25" height="12" rx="6" fill="#E4E9F2"/>
  <rect x="180" y="128" width="8" height="12" rx="6" fill="#E4E9F2" fill-opacity="0.5"/>

  <!-- Divider -->
  <rect x="93" y="148" width="104" height="1" fill="#E4E9F2"/>

  <!-- Price field -->
  <rect x="93" y="156" width="60" height="16" rx="6" fill="#F4F6FB" stroke="#E4E9F2" stroke-width="1"/>
  <rect x="98" y="161" width="28" height="6" rx="3" fill="#9BACC8"/>
  <rect x="156" y="159" width="24" height="8" rx="3" fill="#9BACC8" fill-opacity="0.5"/>

  <!-- Publish button -->
  <rect x="93" y="183" width="104" height="20" rx="10" fill="url(#acc2)"/>
  <rect x="110" y="190" width="70" height="6" rx="3" fill="white" fill-opacity="0.9"/>

  <!-- Timer / clock on right -->
  <circle cx="248" cy="80" r="32" fill="url(#prim2)" fill-opacity="0.08"/>
  <circle cx="248" cy="80" r="24" fill="white" filter="url(#sh2)"/>
  <circle cx="248" cy="80" r="20" fill="none" stroke="#E4E9F2" stroke-width="2"/>
  <!-- Clock hand -->
  <circle cx="248" cy="80" r="2" fill="#1A3FC4"/>
  <line x1="248" y1="80" x2="248" y2="64" stroke="#1A3FC4" stroke-width="2" stroke-linecap="round"/>
  <line x1="248" y1="80" x2="260" y2="83" stroke="#FF5C00" stroke-width="2" stroke-linecap="round"/>
  <!-- 60s label -->
  <rect x="232" y="108" width="32" height="14" rx="7" fill="url(#acc2)"/>
  <rect x="237" y="113" width="22" height="4" rx="2" fill="white"/>

  <!-- Speed lines -->
  <line x1="228" y1="56" x2="220" y2="52" stroke="#FF5C00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="230" y1="50" x2="225" y2="44" stroke="#FF5C00" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Arrow flying right -->
  <path d="M230 130 L260 130" stroke="#1A3FC4" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <path d="M256 126 L262 130 L256 134" stroke="#1A3FC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
