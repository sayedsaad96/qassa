<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <defs>
    <linearGradient id="pr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
  </defs>

  <!-- Clipboard base -->
  <rect x="50" y="30" width="100" height="125" rx="12" fill="#EEF2FF"/>
  <rect x="54" y="34" width="92" height="117" rx="10" fill="white"/>

  <!-- Clipboard clip -->
  <rect x="75" y="22" width="50" height="18" rx="9" fill="#E4E9F2"/>
  <rect x="82" y="26" width="36" height="10" rx="5" fill="#9BACC8"/>

  <!-- Empty lines on clipboard -->
  <rect x="66" y="58" width="68" height="6" rx="3" fill="#E4E9F2"/>
  <rect x="66" y="72" width="50" height="6" rx="3" fill="#E4E9F2"/>
  <rect x="66" y="86" width="60" height="6" rx="3" fill="#E4E9F2"/>
  <rect x="66" y="100" width="40" height="6" rx="3" fill="#E4E9F2"/>

  <!-- Plus icon in center of clipboard -->
  <circle cx="100" cy="118" r="16" fill="#EEF2FF"/>
  <line x1="100" y1="111" x2="100" y2="125" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="118" x2="107" y2="118" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tiny factory icons floating -->
  <circle cx="32" cy="80" r="14" fill="url(#pr)" fill-opacity="0.12"/>
  <rect x="26" y="80" width="12" height="10" rx="2" fill="#1A3FC4" fill-opacity="0.25"/>
  <rect x="27" y="74" width="3" height="8" rx="1.5" fill="#1A3FC4" fill-opacity="0.2"/>
  <rect x="33" y="72" width="3" height="10" rx="1.5" fill="#1A3FC4" fill-opacity="0.2"/>

  <circle cx="168" cy="100" r="14" fill="url(#pr)" fill-opacity="0.1"/>
  <rect x="162" y="100" width="12" height="10" rx="2" fill="#1A3FC4" fill-opacity="0.22"/>
  <rect x="163" y="94" width="3" height="8" rx="1.5" fill="#1A3FC4" fill-opacity="0.18"/>
  <rect x="169" y="92" width="3" height="10" rx="1.5" fill="#1A3FC4" fill-opacity="0.18"/>

  <!-- Dashed circle around clipboard -->
  <circle cx="100" cy="90" r="68" fill="none" stroke="#1A3FC4" stroke-width="1" stroke-dasharray="4 5" stroke-opacity="0.15"/>
</svg>
