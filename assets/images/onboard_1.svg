<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="320" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A3FC4"/>
      <stop offset="100%" stop-color="#4F72F0"/>
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A3FC4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="240" fill="url(#bg1)"/>

  <!-- Floating dots decoration -->
  <circle cx="20" cy="30" r="6" fill="#1A3FC4" fill-opacity="0.08"/>
  <circle cx="290" cy="200" r="10" fill="#FF5C00" fill-opacity="0.1"/>
  <circle cx="300" cy="40" r="5" fill="#1A3FC4" fill-opacity="0.06"/>
  <circle cx="30" cy="210" r="8" fill="#FF5C00" fill-opacity="0.07"/>

  <!-- Main phone mockup -->
  <rect x="110" y="20" width="100" height="200" rx="16" fill="white" filter="url(#shadow1)"/>
  <rect x="113" y="23" width="94" height="194" rx="14" fill="#F4F6FB"/>
  <!-- Phone notch -->
  <rect x="142" y="23" width="36" height="8" rx="4" fill="#E4E9F2"/>

  <!-- App header in phone -->
  <rect x="113" y="31" width="94" height="28" rx="0" fill="white"/>
  <rect x="120" y="39" width="48" height="6" rx="3" fill="#1A3FC4" fill-opacity="0.8"/>
  <circle cx="196" cy="42" r="5" fill="#E4E9F2"/>

  <!-- Search bar -->
  <rect x="118" y="64" width="84" height="16" rx="8" fill="white"/>
  <circle cx="131" cy="72" r="4" fill="none" stroke="#1A3FC4" stroke-width="1.5"/>
  <line x1="134" y1="75" x2="137" y2="78" stroke="#1A3FC4" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="138" y="69" width="40" height="6" rx="3" fill="#E4E9F2"/>

  <!-- Factory cards in phone -->
  <!-- Card 1 -->
  <rect x="118" y="85" width="84" height="32" rx="6" fill="white"/>
  <rect x="122" y="89" width="16" height="16" rx="4" fill="url(#primary)"/>
  <text x="125" y="100" font-size="9" fill="white" text-anchor="middle">🏭</text>
  <rect x="142" y="91" width="28" height="4" rx="2" fill="#1A3FC4" fill-opacity="0.7"/>
  <rect x="142" y="98" width="20" height="3" rx="1.5" fill="#9BACC8"/>
  <rect x="175" y="95" width="22" height="10" rx="5" fill="#EEF2FF"/>
  <rect x="178" y="98" width="16" height="3" rx="1.5" fill="#1A3FC4" fill-opacity="0.6"/>

  <!-- Card 2 -->
  <rect x="118" y="121" width="84" height="32" rx="6" fill="white"/>
  <rect x="122" y="125" width="16" height="16" rx="4" fill="#00A86B"/>
  <text x="125" y="136" font-size="9" fill="white" text-anchor="middle">🏭</text>
  <rect x="142" y="127" width="24" height="4" rx="2" fill="#1A3FC4" fill-opacity="0.7"/>
  <rect x="142" y="134" width="18" height="3" rx="1.5" fill="#9BACC8"/>
  <rect x="175" y="131" width="22" height="10" rx="5" fill="#E6F9F3"/>
  <rect x="178" y="134" width="16" height="3" rx="1.5" fill="#00A86B" fill-opacity="0.7"/>

  <!-- Card 3 partial -->
  <rect x="118" y="157" width="84" height="25" rx="6" fill="white" fill-opacity="0.7"/>
  <rect x="122" y="161" width="16" height="16" rx="4" fill="#FF5C00" fill-opacity="0.8"/>

  <!-- Search magnifier floating -->
  <circle cx="240" cy="80" r="28" fill="url(#primary)" fill-opacity="0.1"/>
  <circle cx="240" cy="80" r="20" fill="white" filter="url(#shadow1)"/>
  <circle cx="238" cy="78" r="9" fill="none" stroke="#1A3FC4" stroke-width="2.5"/>
  <line x1="244" y1="84" x2="252" y2="92" stroke="#1A3FC4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Stars decoration -->
  <text x="60" y="100" font-size="18" fill="#F59E0B" fill-opacity="0.9">★</text>
  <text x="252" y="140" font-size="14" fill="#F59E0B" fill-opacity="0.7">★</text>
  <text x="75" y="160" font-size="10" fill="#F59E0B" fill-opacity="0.5">★</text>

  <!-- Pin marker -->
  <circle cx="75" cy="130" r="12" fill="url(#primary)" fill-opacity="0.12"/>
  <path d="M75 120 C70 120 66 124 66 129 C66 134 75 142 75 142 C75 142 84 134 84 129 C84 124 80 120 75 120Z" fill="#1A3FC4" fill-opacity="0.7"/>
  <circle cx="75" cy="129" r="3" fill="white"/>
</svg>
