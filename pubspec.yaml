name: qassa
description: Qassa — قِصّة كل قطعة تبدأ هنا · Arabic fashion B2B marketplace
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # ── State Management ──────────────────────────────
  # 8.1.6 → 9.1.1 | BREAKING: `cubit` param renamed to `bloc` in
  # BlocBuilder, BlocListener, BlocConsumer — run: sed -i 's/cubit:/bloc:/g'
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7 # 2.0.5 → 2.0.7 (patch)

  # ── Navigation ────────────────────────────────────
  # 13.2.5 → 16.3.0 | BREAKING: URLs are now case-sensitive (16.0),
  # min Flutter 3.32 / Dart 3.8. Our lowercase routes are unaffected.
  go_router: ^17.1.0

  # ── Backend ───────────────────────────────────────
  supabase_flutter: ^2.9.1 # 2.5.6 → 2.9.1 (no breaking API changes)

  # ── HTTP ──────────────────────────────────────────
  dio: ^5.9.2 # 5.4.3+1 → 5.9.2 (compatible)

  # ── Models / Code Generation ──────────────────────
  # 2.4.1 → 3.0.0 | BREAKING: requires freezed ^2.5.7+, generates
  # different copy-with syntax. Since we use no Freezed-generated models
  # (only annotations via dartz), this is safe as-is.
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0 # 4.9.0 → 4.9.0 (no change)

  # ── Dependency Injection ──────────────────────────
  # 7.7.0 → 8.0.3 | BREAKING: `registerSingleton` signature changed;
  # `registerLazySingleton` and `registerFactory` are unchanged —
  # our code is fully compatible.
  get_it: ^9.2.1

  # ── Functional Programming ────────────────────────
  dartz: ^0.10.1 # 0.10.1 — latest (no updates)

  # ── Image ─────────────────────────────────────────
  cached_network_image: ^3.4.1 # 3.3.1 → 3.4.1 (minor)
  image_picker: ^1.1.2 # 1.1.2 — no change
  flutter_svg: ^2.2.0 # 2.0.10+1 → 2.2.0 (compatible)

  # ── Utils ─────────────────────────────────────────
  url_launcher: ^6.3.0 # 6.3.0 — no change
  intl: ^0.20.2 # 0.19.0 → 0.20.2 (compatible)
  shared_preferences: ^2.3.5 # 2.2.3 → 2.3.5 (minor)
  flutter_dotenv: ^6.0.0 # 5.1.0 → 5.2.0 (minor)

  # ── UI ────────────────────────────────────────────
  shimmer: ^3.0.0 # 3.0.0 — no change
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # 4.0.0 → 5.0.0 (stricter lints, review warnings)
  build_runner: ^2.13.1 # 2.4.13 → 2.4.15 (patch)
  freezed: ^3.2.5 # 2.5.2 → 2.5.7 (patch)
  json_serializable: ^6.13.1 # 6.8.0 → 6.9.5 (minor)
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - .env
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo/Cairo-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Cairo/Cairo-Black.ttf
          weight: 900
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal/Tajawal-Bold.ttf
          weight: 700
